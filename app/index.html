<!DOCTYPE html>
<html lang="uk" style="background:#0A0C14;">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>áClub</title>
<link rel="stylesheet" href="styles.css?v=8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://telegram.org">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="runner-skins.js?v=8"></script>
</head>
<body>

<div class="topbar">
  <div class="brand"><div class="brand-mark">á</div><div class="brand-name">áClub</div></div>
  <div class="pills">
    <div class="pill coin">💰<span class="val mono" id="pillCoin">0</span></div>
    <div class="pill shard">🔮<span class="val mono" id="pillShard">0</span></div>
  </div>
</div>

<div class="content" id="screen"><div class="loading"><div class="spin"></div></div></div>

<div class="navbar" id="navbar"></div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg"></div>
<div class="modal" id="modal"></div>

<script src="app.js?v=8"></script>
</body>
</html>
