// ── ГЕНЕРАТОР ─────────────────────────────────────────
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

function canForm(word,letters){
  const p=[...letters];
  for(const ch of word){const i=p.indexOf(ch);if(i<0)return false;p.splice(i,1);}
  return true;
}

function generateLevel(){
  const sw=shuffle(WORDS);
  for(let att=0;att<100;att++){
    const anchor=sw[att%sw.length];
    if(!anchor||anchor.length<4||anchor.length>5)continue;
    // Збираємо пул з букв якоря + випадкові (10 букв для більше слів)
    const pool=[...new Set(anchor.split(''))];
    for(const l of shuffle('АЕІОУРСНТМКЛГДПБВХЗЙЩ'.split(''))){
      if(pool.length>=10)break;
      if(!pool.includes(l))pool.push(l);
    }
    // Знаходимо слова
    const pos=shuffle(WORDS.filter(w=>w.length>=3&&w.length<=5&&canForm(w,pool)));
    if(pos.length<3)continue;
    // Відбираємо рівно 6 слів
    const byL={3:[],4:[],5:[]};
    for(const w of pos)if(byL[w.length])byL[w.length].push(w);
    const chosen=[];
    for(const l of [4,5,3]){
      for(let i=0;i<byL[l].length;i++){
        if(!chosen.includes(byL[l][i]))chosen.push(byL[l][i]);
        if(chosen.length>=6)break;
      }
      if(chosen.length>=6)break;
    }
    if(chosen.length<6)continue;
    const grid=buildCrossword(chosen);
    if(!grid||grid.length<6)continue;
    return{letters:shuffle(pool.slice(0,10)),words:grid.slice(0,6)};
  }
  return null;
}

// ── КРОСВОРД БУДІВНИК ─────────────────────────────────
function buildCrossword(words){
  const placed=[{word:words[0],row:0,col:0,dir:'h',found:false}];
  for(let wi=1;wi<words.length;wi++){
    const w=words[wi];let ok=false;
    // Пробуємо всі можливі перетини
    const candidates=[];
    for(const pw of placed){
      for(let pi=0;pi<pw.word.length;pi++){
        for(let wi2=0;wi2<w.length;wi2++){
          if(pw.word[pi]!==w[wi2])continue;
          const nd=pw.dir==='h'?'v':'h';
          const nr=pw.dir==='h'?pw.row-wi2:pw.row+pi;
          const nc=pw.dir==='h'?pw.col+pi:pw.col-wi2;
          if(nr<0||nc<0)continue;
          if(chkPlace(placed,w,nr,nc,nd))candidates.push({word:w,row:nr,col:nc,dir:nd,found:false});
        }
      }
    }
    if(candidates.length>0){
      placed.push(candidates[Math.floor(Math.random()*candidates.length)]);
      ok=true;
    }
    if(!ok&&wi<4) return null; // перші 4 слова обовʼязкові
  }
  if(placed.length<6)return null;
  const minR=Math.min(...placed.map(p=>p.row));
  const minC=Math.min(...placed.map(p=>p.col));
  const maxR2=Math.max(...placed.map(p=>p.dir==='v'?p.row+p.word.length-1:p.row))-minR;
  const maxC2=Math.max(...placed.map(p=>p.dir==='h'?p.col+p.word.length-1:p.col))-minC;
  if(maxR2>8||maxC2>8)return null;
  return placed.map(p=>({...p,row:p.row-minR,col:p.col-minC}));
}

function chkPlace(placed,word,row,col,dir){
  const cells={};
  for(const p of placed)for(let i=0;i<p.word.length;i++){
    const r=p.dir==='h'?p.row:p.row+i,c=p.dir==='h'?p.col+i:p.col;
    cells[r+'_'+c]=p.word[i];
  }
  for(let i=0;i<word.length;i++){
    const r=dir==='h'?row:row+i,c=dir==='h'?col+i:col,k=r+'_'+c;
    if(cells[k]&&cells[k]!==word[i])return false;
    if(!cells[k]){
      if(dir==='h'){if(cells[(r-1)+'_'+c]||cells[(r+1)+'_'+c])return false;}
      else{if(cells[r+'_'+(c-1)]||cells[r+'_'+(c+1)])return false;}
    }
  }
  const er=dir==='h'?row:row+word.length,ec=dir==='h'?col+word.length:col;
  if(cells[er+'_'+ec])return false;
  const pr=dir==='h'?row:row-1,pc=dir==='h'?col-1:col;
  if(pr>=0&&pc>=0&&cells[pr+'_'+pc])return false;
  return true;
}

// ── STATE ─────────────────────────────────────────────
let level=0,coins=0,hints=3,hintNextTime=0;
const HINT_IV=2*60*60*1000,MAX_H=5;
let curLetters=[],curWords=[],selIdx=[],dragging=false,lvlStart=0;
let GRID={},maxR=0,maxC=0;
let cwCv,cwCtx,cirCv,cirCtx,CS=260,CR=0,nodePos=[];
const CELL=34,GAP=3,NR=22;

// ── START ─────────────────────────────────────────────
function startGame(){
  hide('ovStart');
  show('gameHead');show('cwWrap');show('curWord');show('cirWrap');
  cwCv=$i('cwCv');cwCtx=cwCv.getContext('2d');
  cirCv=$i('cirCv');cirCtx=cirCv.getContext('2d');
  // Розмір кола ПЕРШИМ — потім кросворд
  sizeCircle();
  setupEvents();
  loadLevel();
}

function loadLevel(){
  hide('ovWin');
  let data=null;
  for(let i=0;i<30;i++){data=generateLevel();if(data)break;}
  if(!data){toast('❌ Помилка генерації, спробуй ще');return;}
  curLetters=data.letters;curWords=data.words;
  selIdx=[];dragging=false;lvlStart=Date.now();
  $i('lvlNum').textContent=level+1;
  $i('coinCount').textContent=coins;
  updateHintUI();
  $i('curWord').textContent='・・・';
  $i('curWord').className='cur';
  buildGrid();sizeCW();drawCW();drawCircle();
}

function buildGrid(){
  GRID={};maxR=0;maxC=0;
  curWords.forEach(e=>{
    for(let i=0;i<e.word.length;i++){
      const r=e.dir==='h'?e.row:e.row+i,c=e.dir==='h'?e.col+i:e.col;
      const k=r+'_'+c;
      if(!GRID[k])GRID[k]={l:e.word[i],found:false,hint:false};
      maxR=Math.max(maxR,r);maxC=Math.max(maxC,c);
    }
  });
}

// ── CROSSWORD CANVAS ──────────────────────────────────
function sizeCW(){
  const cols=maxC+1,rows=maxR+1;
  const vw=Math.min(window.innerWidth,420)-24;
  const availH=window.innerHeight-55-30-CS-20;
  const cs=Math.max(22,Math.min(CELL,Math.floor(vw/cols),rows>1?Math.floor(availH/rows):CELL));
  cwCv.width=cols*(cs+GAP)+10;cwCv.height=rows*(cs+GAP)+6;
  cwCv.style.width=cwCv.width+'px';cwCv.style.height=cwCv.height+'px';
  cwCv._cs=cs;
}

function cxy(r,c){const cs=cwCv._cs||CELL;return{x:5+c*(cs+GAP),y:3+r*(cs+GAP),cs};}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function drawCW(){
  cwCtx.clearRect(0,0,cwCv.width,cwCv.height);
  Object.entries(GRID).forEach(([k,cell])=>{
    const[r,c]=k.split('_').map(Number);
    const{x,y,cs}=cxy(r,c);
    cwCtx.fillStyle=cell.found?'#063d24':cell.hint?'#3d3214':'rgba(255,255,255,0.07)';
    cwCtx.strokeStyle=cell.found?'#00e676':cell.hint?'#ffd740':'rgba(255,255,255,0.18)';
    cwCtx.lineWidth=1.5;rrect(cwCtx,x,y,cs,cs,4);cwCtx.fill();cwCtx.stroke();
    if(cell.found||cell.hint){
      cwCtx.fillStyle=cell.found?'#00e676':'#ffd740';
      cwCtx.font=`900 ${cs*.44}px Nunito,sans-serif`;
      cwCtx.textAlign='center';cwCtx.textBaseline='middle';
      cwCtx.fillText(cell.l,x+cs/2,y+cs/2+1);
    }
  });
}

function markFound(word,row,col,dir){
  for(let i=0;i<word.length;i++){
    const r=dir==='h'?row:row+i,c=dir==='h'?col+i:col;
    const k=r+'_'+c;if(GRID[k])GRID[k].found=true;
  }
}

// ── CIRCLE CANVAS ─────────────────────────────────────
function sizeCircle(){
  const vw=Math.min(window.innerWidth,420);
  CS=Math.min(vw-20,260);CR=(CS/2)*.72;
  cirCv.width=CS;cirCv.height=CS;
  cirCv.style.width=CS+'px';cirCv.style.height=CS+'px';
}

function calcPos(){
  const cx=CS/2,cy=CS/2,n=curLetters.length;
  nodePos=curLetters.map((_,i)=>{
    const a=2*Math.PI*i/n-Math.PI/2;
    return{x:cx+CR*Math.cos(a),y:cy+CR*Math.sin(a)};
  });
}

function drawCircle(mx,my){
  if(!cirCtx)return;
  calcPos(); // завжди оновлюємо позиції перед малюванням
  const ctx=cirCtx,cx=CS/2,cy=CS/2;
  ctx.clearRect(0,0,CS,CS);
  // bg
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,CR+NR+4,0,Math.PI*2);
  ctx.fillStyle='rgba(10,18,40,0.85)';ctx.fill();
  ctx.strokeStyle='rgba(0,230,118,0.1)';ctx.lineWidth=1;ctx.stroke();ctx.restore();
  // lines
  if(selIdx.length>=2){
    ctx.save();ctx.strokeStyle='rgba(0,230,118,0.55)';ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();const p0=nodePos[selIdx[0]];ctx.moveTo(p0.x,p0.y);
    for(let i=1;i<selIdx.length;i++){const p=nodePos[selIdx[i]];ctx.lineTo(p.x,p.y);}
    ctx.stroke();ctx.restore();
  }
  // live line
  if(dragging&&selIdx.length>=1&&mx!==undefined){
    const last=nodePos[selIdx[selIdx.length-1]];
    ctx.save();ctx.strokeStyle='rgba(0,230,118,0.3)';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(mx,my);
    ctx.stroke();ctx.setLineDash([]);ctx.restore();
  }
  // nodes
  curLetters.forEach((letter,i)=>{
    const{x,y}=nodePos[i],sel=selIdx.includes(i),isLast=selIdx[selIdx.length-1]===i;
    if(sel){
      ctx.save();const g=ctx.createRadialGradient(x,y,NR*.5,x,y,NR*1.8);
      g.addColorStop(0,'rgba(0,230,118,0.25)');g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,NR*1.8,0,Math.PI*2);ctx.fill();ctx.restore();
    }
    ctx.save();ctx.beginPath();ctx.arc(x,y,NR,0,Math.PI*2);
    if(isLast){const g=ctx.createRadialGradient(x-3,y-3,2,x,y,NR);g.addColorStop(0,'#00e676');g.addColorStop(1,'#007a3d');ctx.fillStyle=g;}
    else if(sel)ctx.fillStyle='#0a2e1a';
    else{const g=ctx.createRadialGradient(x-3,y-4,2,x,y,NR);g.addColorStop(0,'#1e2d50');g.addColorStop(1,'#0d1630');ctx.fillStyle=g;}
    ctx.fill();
    ctx.strokeStyle=isLast?'#00e676':sel?'rgba(0,230,118,0.7)':'rgba(255,255,255,0.1)';
    ctx.lineWidth=sel?2:1.5;ctx.stroke();ctx.restore();
    ctx.save();ctx.font=`900 ${NR*.9}px Nunito,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=isLast?'#050d1a':sel?'#00e676':'#e8edf5';ctx.fillText(letter,x,y+1);ctx.restore();
  });
}

// ── EVENTS ────────────────────────────────────────────
function evP(e){const r=cirCv.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
function nearNode(x,y){for(let i=0;i<nodePos.length;i++){const p=nodePos[i];if((x-p.x)**2+(y-p.y)**2<=(NR+8)**2)return i;}return -1;}

function setupEvents(){
  cirCv.addEventListener('mousedown',e=>{e.preventDefault();const p=evP(e);startSel(p.x,p.y);});
  cirCv.addEventListener('mousemove',e=>{e.preventDefault();const p=evP(e);moveSel(p.x,p.y);});
  cirCv.addEventListener('mouseup',  e=>{e.preventDefault();endSel();});
  cirCv.addEventListener('touchstart',e=>{e.preventDefault();const p=evP(e);startSel(p.x,p.y);},{passive:false});
  cirCv.addEventListener('touchmove', e=>{e.preventDefault();const p=evP(e);moveSel(p.x,p.y);},{passive:false});
  cirCv.addEventListener('touchend',  e=>{e.preventDefault();endSel();},{passive:false});
}

function startSel(x,y){const i=nearNode(x,y);if(i<0)return;dragging=true;selIdx=[i];updWord();drawCircle(x,y);}
function moveSel(x,y){
  if(!dragging){drawCircle(x,y);return;}
  const i=nearNode(x,y);
  if(i>=0){
    const last=selIdx[selIdx.length-1];
    if(i!==last){
      if(selIdx.length>=2&&selIdx[selIdx.length-2]===i)selIdx.pop();
      else if(!selIdx.includes(i))selIdx.push(i);
      updWord();
    }
  }
  drawCircle(x,y);
}
function endSel(){if(!dragging)return;dragging=false;checkWord();selIdx=[];updWord();drawCircle();}

function updWord(){
  const el=$i('curWord'),w=selIdx.map(i=>curLetters[i]).join('');
  if(!w){el.textContent='・・・';el.className='cur';return;}
  el.textContent=w;
  el.className='cur'+(curWords.find(e=>!e.found&&e.word===w)?' ok':w.length>=3?' bad':'');
}

function checkWord(){
  const w=selIdx.map(i=>curLetters[i]).join('');if(w.length<3)return;
  const wi=curWords.findIndex(e=>!e.found&&e.word===w);
  if(wi>=0){
    curWords[wi].found=true;markFound(curWords[wi].word,curWords[wi].row,curWords[wi].col,curWords[wi].dir);
    drawCW();toast('✅ '+w);
    if(curWords.every(e=>e.found))setTimeout(showWin,500);
  }
}

// ── HINTS ─────────────────────────────────────────────
function updateHintUI(){
  const hb=$i('hintBtn');
  if(hints>0){hb.innerHTML='💡 <span id="hintCount">'+hints+'</span>';hb.style.opacity='1';hb.onclick=useHint;}
  else{
    const left=hintNextTime-Date.now();
    hb.innerHTML=left>0?'⏳ '+(left/3600000|0)+'г '+(left%3600000/60000|0)+'хв':'💡 купити';
    hb.style.opacity='0.7';hb.onclick=showBuyHint;
  }
}

let hintTimer=setInterval(()=>{
  if(hints>=MAX_H)return;
  if(hintNextTime>0&&Date.now()>=hintNextTime){
    hints=Math.min(hints+1,MAX_H);hintNextTime=Date.now()+HINT_IV;
    updateHintUI();toast('💡 +1 підказка поновилась!');saveHints();
  } else updateHintUI();
},30000);

async function saveHints(){
  const u=uid();if(!u)return;
  try{await fetch(`${GAS}?type=circle_hints_save&userId=${u}&hints=${hints}&hintNextTime=${hintNextTime}&secret=${SECRET}&_t=${Date.now()}`);}catch(e){}
}

function showBuyHint(){
  const left=hintNextTime-Date.now();
  $i('hintTimerMsg').textContent=left>0?`Або зачекай ${left/3600000|0}г ${left%3600000/60000|0}хв`:'';
  $i('buyHintBtn').disabled=coins<1;$i('buyHintBtn').style.opacity=coins<1?'0.4':'1';
  show('ovBuyHint');
}

async function buyHint(){
  if(coins<1){toast('❌ Недостатньо монет!');return;}
  const u=uid();
  if(!u){toast('❌ Помилка авторизації');return;}
  $i('buyHintBtn').disabled=true;
  try{
    const res=await fetch(GAS+'?type=circle_buy_hint&userId='+u+'&secret='+SECRET+'&_t='+Date.now());
    const d=await res.json();
    if(d.ok){
      coins=d.coins;hints=d.hints;hintNextTime=d.hintNextTime||0;
      $i('coinCount').textContent=coins;updateHintUI();hide('ovBuyHint');toast('✅ Підказку куплено!');
    } else toast(d.error||'❌ Помилка');
  }catch(e){
    // Якщо GAS недоступний — купуємо локально (оновлення при наступній сесії)
    if(coins>=1){coins--;hints++;hintNextTime=Math.max(hintNextTime,Date.now()+HINT_IV);
      $i('coinCount').textContent=coins;updateHintUI();hide('ovBuyHint');toast('✅ Підказку куплено!');}
  }
  $i('buyHintBtn').disabled=false;
}

function useHint(){
  if(hints<=0){showBuyHint();return;}
  const unfound=curWords.filter(e=>!e.found);if(!unfound.length)return;
  let hk=null,hl='';
  outer:for(const e of shuffle([...unfound])){
    for(let i=0;i<e.word.length;i++){
      const r=e.dir==='h'?e.row:e.row+i,c=e.dir==='h'?e.col+i:e.col,k=r+'_'+c;
      if(GRID[k]&&!GRID[k].found&&!GRID[k].hint){hk=k;hl=e.word[i];break outer;}
    }
  }
  if(!hk){toast('💡 Немає що розкривати');return;}
  GRID[hk].hint=true;hints--;
  hintNextTime=Math.max(hintNextTime,Date.now()+HINT_IV);
  updateHintUI();drawCW();toast('💡 Буква "'+hl+'" відкрита!');saveHints();
}

// ── WIN ───────────────────────────────────────────────
function showWin(){
  coins++;$i('coinCount').textContent=coins;
  $i('winCoins').textContent='+1 🪙 (всього: '+coins+')';
  $i('winWords').textContent='Знайдено '+curWords.length+' слів!';
  show('ovWin');sendResult();
}
function nextLevel(){level++;hide('ovWin');loadLevel();}
function closeGame(){if(tg?.close)tg.close();else toast('Гру завершено!');}

async function sendResult(){
  const u=uid();if(!u)return;
  const el=Math.round((Date.now()-lvlStart)/1000);
  const url=GAS+'?type=circle_result&userId='+u+'&level='+level+'&score='+curWords.length+'&elapsed='+el+'&secret='+SECRET+'&_t='+Date.now();
  for(let i=0;i<3;i++){
    try{const r=await fetch(url);const d=await r.json();
      if(d.ok){if(d.coins!==undefined){coins=d.coins;$i('coinCount').textContent=coins;$i('winCoins').textContent='+1 🪙 (всього: '+coins+')';}return;}
    }catch(e){}
    await new Promise(r=>setTimeout(r,2000));
  }
}

// ── INIT ──────────────────────────────────────────────
async function init(){
  const u=uid();
  if(u){
    try{
      const r=await fetch(GAS+'?type=circle_init&userId='+u+'&secret='+SECRET+'&_t='+Date.now());
      const d=await r.json();
      if(d.coins!==undefined)coins=d.coins;
      if(d.hints!==undefined)hints=d.hints;
      if(d.hintNextTime!==undefined)hintNextTime=d.hintNextTime;
      if(hints===0&&hintNextTime===0){hints=3;}
      $i('coinCount').textContent=coins;
    }catch(e){}
  }
}
init();
</script>
