<script>
const GAS='https://script.google.com/macros/s/AKfycbzH8qt2_fUmnrLEw0Z56fsyMEH-D3uOgBSeTxwzUMCDTFDDoNBAowLTZqEGwSFo26ie9A/exec';
const WRK='https://aclub-runner-test.rjcnz-faw4.workers.dev';
const SECRET='aclub2026runnertest';
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
function getTgUid(){try{return String(tg?.initDataUnsafe?.user?.id||'');}catch(e){return '';}}
function $(id){return document.getElementById(id);}
function showToast(msg,dur=1800){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);}

// ══════════════════════════════════════════════════════
// СЛОВНИК — завантажується з Google Sheets через GAS
// ══════════════════════════════════════════════════════
let WORDS = []; // заповнюється при init()
let wordsLoaded = false;


// ══════════════════════════════════════════════════════
// ГЕНЕРАТОР РІВНЯ
// ══════════════════════════════════════════════════════

function shuffleArr(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function canForm(word,letters){
  const pool=[...letters];
  for(const ch of word){const i=pool.indexOf(ch);if(i<0)return false;pool.splice(i,1);}
  return true;
}

// Генерує рівень: спочатку вибираємо слова, потім збираємо букви з них
function generateLevel(){
  if(!WORDS||WORDS.length<10) return null;
  const shuffled=shuffleArr(WORDS);

  // Вибираємо 4-5 слів які мають спільні букви (для кросворду)
  for(let attempt=0;attempt<50;attempt++){
    // Беремо випадкове "якорне" слово 4-5 букв
    const anchors=shuffled.filter(w=>w.length>=4&&w.length<=5);
    if(!anchors.length) return null;
    const anchor=anchors[Math.floor(Math.random()*anchors.length)];

    // Збираємо всі унікальні букви з anchor + ще 2-4 рандомних букв
    const letters=[...new Set(anchor.split(''))];
    // Додаємо букви поки не набереться 8
    const extraLetters='АЕІОУРСНТМКЛГДПБВХЗЙФЩЖ'.split('');
    const extra=shuffleArr(extraLetters);
    for(const l of extra){
      if(letters.length>=8) break;
      if(!letters.includes(l)) letters.push(l);
    }
    const pool=letters.slice(0,8);

    // Знаходимо всі слова з цих букв
    const possible=shuffleArr(WORDS.filter(w=>w.length>=3&&w.length<=5&&canForm(w,pool)));
    if(possible.length<3) continue;

    // Вибираємо 4-5 слів різної довжини
    const byLen={3:[],4:[],5:[]};
    for(const w of possible) if(byLen[w.length]) byLen[w.length].push(w);
    const chosen=[];
    for(const len of [4,5,3]){
      for(let i=0;i<Math.min(2,byLen[len].length);i++) chosen.push(byLen[len][i]);
      if(chosen.length>=5) break;
    }
    if(chosen.length<3) continue;

    // Будуємо кросворд
    const grid=buildCrossword(chosen);
    if(!grid) continue;

    return{letters:shuffleArr(pool), words:grid};
  }
  return null;
}

// ══════════════════════════════════════════════════════
// АВТОМАТИЧНИЙ КРОСВОРД
// ══════════════════════════════════════════════════════
function buildCrossword(words){
  const placed=[];
  placed.push({word:words[0],row:0,col:0,dir:'h',found:false});
  for(let wi=1;wi<words.length;wi++){
    const w=words[wi];
    let added=false;
    const dirs=['h','v'];
    for(const pw of shuffleArr([...placed])){
      for(let pi=0;pi<pw.word.length&&!added;pi++){
        for(let wi2=0;wi2<w.length&&!added;wi2++){
          if(pw.word[pi]!==w[wi2]) continue;
          const newDir=pw.dir==='h'?'v':'h';
          let nr,nc;
          if(pw.dir==='h'){nc=pw.col+pi;nr=pw.row-wi2;}
          else{nr=pw.row+pi;nc=pw.col-wi2;}
          if(nr<0||nc<0) continue;
          if(checkPlacement(placed,w,nr,nc,newDir)){
            placed.push({word:w,row:nr,col:nc,dir:newDir,found:false});
            added=true;
          }
        }
      }
      if(added) break;
    }
  }
  if(placed.length<3) return null;
  // Нормалізація
  const minR=Math.min(...placed.map(p=>p.row));
  const minC=Math.min(...placed.map(p=>p.col));
  // Перевірка розміру — не більше 8 колонок і 8 рядків
  const maxR2=Math.max(...placed.map(p=>p.dir==='h'?p.row:p.row+p.word.length-1))-minR;
  const maxC2=Math.max(...placed.map(p=>p.dir==='h'?p.col+p.word.length-1:p.col))-minC;
  if(maxR2>7||maxC2>7) return null;
  return placed.map(p=>({...p,row:p.row-minR,col:p.col-minC}));
}

function checkPlacement(placed,word,row,col,dir){
  const cells={};
  for(const p of placed){
    for(let i=0;i<p.word.length;i++){
      const r=p.dir==='h'?p.row:p.row+i;
      const c=p.dir==='h'?p.col+i:p.col;
      cells[`${r}_${c}`]=p.word[i];
    }
  }
  for(let i=0;i<word.length;i++){
    const r=dir==='h'?row:row+i;
    const c=dir==='h'?col+i:col;
    const key=`${r}_${c}`;
    if(cells[key]&&cells[key]!==word[i]) return false;
    if(!cells[key]){
      if(dir==='h'){if(cells[`${r-1}_${c}`]||cells[`${r+1}_${c}`]) return false;}
      else{if(cells[`${r}_${c-1}`]||cells[`${r}_${c+1}`]) return false;}
    }
  }
  const endR=dir==='h'?row:row+word.length;
  const endC=dir==='h'?col+word.length:col;
  if(cells[`${endR}_${endC}`]) return false;
  const preR=dir==='h'?row:row-1;
  const preC=dir==='h'?col-1:col;
  if(preR>=0&&preC>=0&&cells[`${preR}_${preC}`]) return false;
  return true;
}

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let level=0, coins=0, hints=0;
let hintNextTime=0; // timestamp коли буде наступна безкоштовна підказка
const HINT_INTERVAL=2*60*60*1000; // 2 години в мс
const MAX_HINTS=5; // максимум підказок
let currentLetters=[], currentWords=[];
let selectedIdx=[], isDragging=false;
let levelStartTime=0;
let GRID={}, maxR=0, maxC=0;
let cwCv,cwCtx,cirCv,cirCtx;
let CS=0,CR=0,nodePos=[];
const CELL=38,GAP=4;
const NODE_R=22;
const svgNS='http://www.w3.org/2000/svg';

function startGame(){
  $('ovStart').classList.add('hide');
  $('gameHead').style.display='';
  $('cwWrap').style.display='';
  $('curWord').style.display='';
  $('circleWrap').style.display='';
  cwCv=$('cwCanvas');cwCtx=cwCv.getContext('2d');
  cirCv=$('circleCanvas');cirCtx=cirCv.getContext('2d');
  setupCircleEvents();
  loadLevel();
}

function loadLevel(){
  $('ovNoWords').classList.add('hide');
  let levelData=null;
  for(let attempt=0;attempt<20;attempt++){
    levelData=generateLevel();
    if(levelData) break;
  }
  if(!levelData){$('ovNoWords').classList.remove('hide');return;}

  currentLetters=shuffleArr([...levelData.letters]);
  currentWords=levelData.words;
  selectedIdx=[];isDragging=false;levelStartTime=Date.now();
  $('lvlNum').textContent=level+1;
  $('coinCount').textContent=coins;
  updateHintUI();
  $('curWord').textContent='・・・';
  $('curWord').className='cur-word';
  rebuildGrid();
  sizeCrossword();
  sizeCircle();
  drawCrossword();
  drawCircle();
}

function rebuildGrid(){
  GRID={};maxR=0;maxC=0;
  currentWords.forEach(e=>{
    for(let i=0;i<e.word.length;i++){
      const r=e.dir==='h'?e.row:e.row+i;
      const c=e.dir==='h'?e.col+i:e.col;
      const key=`${r}_${c}`;
      if(!GRID[key]) GRID[key]={letter:e.word[i],found:false,hint:false};
      maxR=Math.max(maxR,r);maxC=Math.max(maxC,c);
    }
  });
}

// ══════════════════════════════════════════════════════
// CROSSWORD CANVAS
// ══════════════════════════════════════════════════════
function sizeCrossword(){
  const cols=maxC+1,rows=maxR+1;
  const vw=Math.min(window.innerWidth,420);
  // Висота доступна для кросворду: екран мінус header(50) мінус curWord(36) мінус коло(CS+10) мінус відступи
  const availH=window.innerHeight - 50 - 36 - (CS||260) - 30;
  const maxCellW=Math.floor((vw-30)/(cols+0.5));
  const maxCellH=rows>1?Math.floor((availH-10)/(rows+0.3)):CELL;
  const cellSize=Math.min(CELL, maxCellW, maxCellH, 36);
  const cw=(cols*cellSize+(cols-1)*GAP)+20;
  const ch=(rows*cellSize+(rows-1)*GAP)+10;
  cwCv.width=cw;cwCv.height=ch;
  cwCv.style.width=cw+'px';cwCv.style.height=ch+'px';
  cwCv._cell=cellSize;
}
function cellXY(r,c){
  const cs=cwCv._cell||CELL;
  return{x:10+c*(cs+GAP),y:5+r*(cs+GAP),cs};
}
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function drawCrossword(){
  const cw=cwCv.width,ch=cwCv.height;
  cwCtx.clearRect(0,0,cw,ch);
  Object.entries(GRID).forEach(([key,cell])=>{
    const[r,c]=key.split('_').map(Number);
    const{x,y,cs}=cellXY(r,c);
    if(cell.found){cwCtx.fillStyle='#063d24';cwCtx.strokeStyle='#00e676';}
    else if(cell.hint){cwCtx.fillStyle='#3d3214';cwCtx.strokeStyle='#ffd740';}
    else{cwCtx.fillStyle='rgba(255,255,255,0.07)';cwCtx.strokeStyle='rgba(255,255,255,0.18)';}
    cwCtx.lineWidth=1.5;
    rr(cwCtx,x,y,cs,cs,5);cwCtx.fill();cwCtx.stroke();
    if(cell.found||cell.hint){
      cwCtx.fillStyle=cell.found?'#00e676':'#ffd740';
      cwCtx.font=`900 ${cs*0.46}px Nunito,sans-serif`;
      cwCtx.textAlign='center';cwCtx.textBaseline='middle';
      cwCtx.fillText(cell.letter,x+cs/2,y+cs/2+1);
    }
  });
}
function markFound(word,row,col,dir){
  for(let i=0;i<word.length;i++){
    const r=dir==='h'?row:row+i;
    const c=dir==='h'?col+i:col;
    const key=`${r}_${c}`;
    if(GRID[key]) GRID[key].found=true;
  }
}

// ══════════════════════════════════════════════════════
// CIRCLE CANVAS
// ══════════════════════════════════════════════════════
function sizeCircle(){
  const vw=Math.min(window.innerWidth,420);
  CS=Math.min(vw-20,260);CR=(CS/2)*0.72;
  cirCv.width=CS;cirCv.height=CS;
  cirCv.style.width=CS+'px';cirCv.style.height=CS+'px';
  const cx=CS/2,cy=CS/2,n=currentLetters.length;
  nodePos=currentLetters.map((_,i)=>{
    const a=(2*Math.PI*i/n)-Math.PI/2;
    return{x:cx+CR*Math.cos(a),y:cy+CR*Math.sin(a)};
  });
}

function drawCircle(mx,my){
  const ctx=cirCtx,cx=CS/2,cy=CS/2;
  ctx.clearRect(0,0,CS,CS);
  // bg disk
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,CR+NODE_R+4,0,Math.PI*2);
  ctx.fillStyle='rgba(10,18,40,0.85)';ctx.fill();
  ctx.strokeStyle='rgba(0,230,118,0.1)';ctx.lineWidth=1;ctx.stroke();ctx.restore();

  // selection lines
  if(selectedIdx.length>=2){
    ctx.save();ctx.strokeStyle='rgba(0,230,118,0.55)';ctx.lineWidth=4;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();
    const p0=nodePos[selectedIdx[0]];ctx.moveTo(p0.x,p0.y);
    for(let i=1;i<selectedIdx.length;i++){const p=nodePos[selectedIdx[i]];ctx.lineTo(p.x,p.y);}
    ctx.stroke();ctx.restore();
  }
  // live line to finger
  if(isDragging&&selectedIdx.length>=1&&mx!==undefined){
    const last=nodePos[selectedIdx[selectedIdx.length-1]];
    ctx.save();ctx.strokeStyle='rgba(0,230,118,0.3)';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(mx,my);
    ctx.stroke();ctx.setLineDash([]);ctx.restore();
  }
  // nodes
  currentLetters.forEach((letter,i)=>{
    const{x,y}=nodePos[i];
    const sel=selectedIdx.includes(i);
    const isLast=selectedIdx[selectedIdx.length-1]===i;
    if(sel){
      ctx.save();const g=ctx.createRadialGradient(x,y,NODE_R*.5,x,y,NODE_R*1.8);
      g.addColorStop(0,'rgba(0,230,118,0.28)');g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,NODE_R*1.8,0,Math.PI*2);ctx.fill();ctx.restore();
    }
    ctx.save();ctx.beginPath();ctx.arc(x,y,NODE_R,0,Math.PI*2);
    if(isLast){const g=ctx.createRadialGradient(x-3,y-3,2,x,y,NODE_R);g.addColorStop(0,'#00e676');g.addColorStop(1,'#007a3d');ctx.fillStyle=g;}
    else if(sel){ctx.fillStyle='#0a2e1a';}
    else{const g=ctx.createRadialGradient(x-3,y-4,2,x,y,NODE_R);g.addColorStop(0,'#1e2d50');g.addColorStop(1,'#0d1630');ctx.fillStyle=g;}
    ctx.fill();
    ctx.strokeStyle=isLast?'#00e676':sel?'rgba(0,230,118,0.7)':'rgba(255,255,255,0.1)';
    ctx.lineWidth=sel?2:1.5;ctx.stroke();ctx.restore();
    ctx.save();ctx.font=`900 ${NODE_R*.9}px Nunito,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=isLast?'#050d1a':sel?'#00e676':'#e8edf5';ctx.fillText(letter,x,y+1);ctx.restore();
  });
}

// ══════════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════════
function setupCircleEvents(){
  cirCv.addEventListener('mousedown',e=>{e.preventDefault();const p=ep(e);tryStart(p.x,p.y);});
  cirCv.addEventListener('mousemove',e=>{e.preventDefault();const p=ep(e);tryMove(p.x,p.y);});
  cirCv.addEventListener('mouseup',  e=>{e.preventDefault();endDrag();});
  cirCv.addEventListener('touchstart',e=>{e.preventDefault();const p=ep(e);tryStart(p.x,p.y);},{passive:false});
  cirCv.addEventListener('touchmove', e=>{e.preventDefault();const p=ep(e);tryMove(p.x,p.y);},{passive:false});
  cirCv.addEventListener('touchend',  e=>{e.preventDefault();endDrag();},{passive:false});
}
function ep(e){const r=cirCv.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};}
function near(x,y){for(let i=0;i<nodePos.length;i++){const p=nodePos[i];if((x-p.x)**2+(y-p.y)**2<=(NODE_R+8)**2)return i;}return -1;}
function tryStart(x,y){const i=near(x,y);if(i<0)return;isDragging=true;selectedIdx=[i];updateCurWord();drawCircle(x,y);}
function tryMove(x,y){if(!isDragging){drawCircle(x,y);return;}const i=near(x,y);
  if(i>=0){const last=selectedIdx[selectedIdx.length-1];
    if(i!==last){if(selectedIdx.length>=2&&selectedIdx[selectedIdx.length-2]===i){selectedIdx.pop();}
    else if(!selectedIdx.includes(i)){selectedIdx.push(i);}updateCurWord();}}drawCircle(x,y);}
function endDrag(){if(!isDragging)return;isDragging=false;checkWord();selectedIdx=[];updateCurWord();drawCircle();}

function updateCurWord(){
  const el=$('curWord');const w=selectedIdx.map(i=>currentLetters[i]).join('');
  if(!w){el.textContent='・・・';el.className='cur-word';return;}
  el.textContent=w;
  const match=currentWords.find(e=>!e.found&&e.word===w);
  el.className='cur-word'+(match?' ok':w.length>=3?' bad':'');
}
function checkWord(){
  const w=selectedIdx.map(i=>currentLetters[i]).join('');if(w.length<3)return;
  const wi=currentWords.findIndex(e=>!e.found&&e.word===w);
  if(wi>=0){currentWords[wi].found=true;markFound(currentWords[wi].word,currentWords[wi].row,currentWords[wi].col,currentWords[wi].dir);
    drawCrossword();showToast(`✅ ${w}`);if(currentWords.every(e=>e.found))setTimeout(showWin,500);}
}

// ══════════════════════════════════════════════════════
// HINTS — загальний ресурс гравця
// ══════════════════════════════════════════════════════
function updateHintUI(){
  const hb=$('hintBtn');
  if(hints>0){
    hb.innerHTML=`💡 <span id="hintCount">${hints}</span>`;
    hb.classList.remove('off');
    hb.style.opacity='1';
    hb.onclick=useHint;
  } else {
    // Рахуємо скільки лишилось до наступної підказки
    const now=Date.now();
    const left=hintNextTime-now;
    if(left>0){
      const hh=Math.floor(left/3600000);
      const mm=Math.floor((left%3600000)/60000);
      hb.innerHTML=`⏳ ${hh}г ${mm}хв`;
    } else {
      hb.innerHTML=`💡 купити`;
    }
    hb.classList.remove('off');
    hb.style.opacity='0.7';
    hb.onclick=showBuyHint;
  }
}

// Таймер поновлення підказок
let hintTimer=null;
function startHintTimer(){
  clearInterval(hintTimer);
  hintTimer=setInterval(()=>{
    const now=Date.now();
    if(hints>=MAX_HINTS){clearInterval(hintTimer);return;}
    if(now>=hintNextTime&&hintNextTime>0){
      hints=Math.min(hints+1,MAX_HINTS);
      hintNextTime=now+HINT_INTERVAL;
      updateHintUI();
      showToast('💡 +1 підказка поновилась!');
      saveHints();
    } else {
      updateHintUI(); // оновлюємо таймер відображення
    }
  },60000); // перевіряємо раз на хвилину
}

async function saveHints(){
  const uid=getTgUid();if(!uid)return;
  try{await fetch(`${GAS}?type=circle_hints_save&userId=${uid}&hints=${hints}&hintNextTime=${hintNextTime}&secret=${SECRET}&_t=${Date.now()}`);}catch(e){}
}

function showBuyHint(){
  const now=Date.now();
  const left=hintNextTime-now;
  const el=$('hintTimerMsg');
  if(left>0){
    const hh=Math.floor(left/3600000);
    const mm=Math.floor((left%3600000)/60000);
    el.textContent=`Або зачекай ще ${hh}г ${mm}хв — безкоштовно`;
  } else {
    el.textContent='Або зачекай — підказка вже готова!';
  }
  $('buyHintBtn').disabled=coins<1;
  $('buyHintBtn').style.opacity=coins<1?'0.4':'1';
  $('ovBuyHint').classList.remove('hide');
}

async function buyHint(){
  if(coins<1){showToast('❌ Недостатньо монет!');return;}
  const uid=getTgUid();
  $('buyHintBtn').disabled=true;
  try{
    const res=await fetch(`${GAS}?type=circle_buy_hint&userId=${uid}&secret=${SECRET}&_t=${Date.now()}`);
    const d=await res.json();
    if(d.ok){
      coins=d.coins;hints=d.hints;hintNextTime=d.hintNextTime||0;
      $('coinCount').textContent=coins;
      updateHintUI();
      $('ovBuyHint').classList.add('hide');
      showToast('✅ Підказку куплено!');
    } else {
      showToast(d.error||'❌ Помилка');
    }
  }catch(e){showToast('❌ Помилка зєднання');}
  $('buyHintBtn').disabled=false;
}

function useHint(){
  if(hints<=0){showBuyHint();return;}
  const unfound=currentWords.filter(e=>!e.found);if(!unfound.length)return;
  let hintKey=null,hintLetter='';
  outer:for(const entry of shuffleArr([...unfound])){
    for(let i=0;i<entry.word.length;i++){
      const r=entry.dir==='h'?entry.row:entry.row+i;
      const c=entry.dir==='h'?entry.col+i:entry.col;
      const key=`${r}_${c}`;
      if(GRID[key]&&!GRID[key].found&&!GRID[key].hint){hintKey=key;hintLetter=entry.word[i];break outer;}
    }
  }
  if(!hintKey){showToast('💡 Немає що розкривати');return;}
  GRID[hintKey].hint=true;hints--;
  hintNextTime=Math.max(hintNextTime,Date.now()+HINT_INTERVAL);
  updateHintUI();
  drawCrossword();showToast(`💡 Буква "${hintLetter}" відкрита!`);
  saveHints();
}

// ══════════════════════════════════════════════════════
// WIN / NEXT
// ══════════════════════════════════════════════════════
function showWin(){
  coins++;$('coinCount').textContent=coins;
  $('winCoins').textContent=`+1 🪙 (всього: ${coins})`;
  $('winWords').textContent=`Знайдено ${currentWords.length} слів!`;
  $('ovWin').classList.remove('hide');sendResult();
}
function nextLevel(){level++;$('ovWin').classList.add('hide');loadLevel();}
function closeGame(){if(tg?.close)tg.close();else showToast('Гру завершено!');}

async function sendResult(){
  const uid=getTgUid();if(!uid)return;
  const elapsed=Math.round((Date.now()-levelStartTime)/1000);
  // Відправляємо результат через GAS — нараховуємо монету
  const url=`${GAS}?type=circle_result&userId=${uid}&level=${level}&score=${currentWords.length}&elapsed=${elapsed}&secret=${SECRET}&_t=${Date.now()}`;
  for(let i=0;i<3;i++){
    try{
      const res=await fetch(url);
      const d=await res.json();
      if(d.ok){
        // Оновлюємо показник монет якщо сервер повернув актуальне значення
        if(d.coins!==undefined){coins=d.coins;$('coinCount').textContent=coins;$('winCoins').textContent=`+1 🪙 (всього: ${coins})`;}
        return;
      }
    }catch(e){}
    await new Promise(r=>setTimeout(r,2000));
  }
}
async function init(){
  // 1. Завантажуємо словник з таблиці
  try{
    const r=await fetch(`${GAS}?type=circle_words&secret=${SECRET}&_t=${Date.now()}`);
    const d=await r.json();
    if(d.ok&&d.words&&d.words.length>10){
      WORDS=[...new Set(d.words.filter(w=>w&&w.length>=3&&w.length<=6&&/^[А-ЯІЇЄҐЬ]+$/.test(w)))];
      wordsLoaded=true;
    }
  }catch(e){}

  // Якщо не завантажились — базовий вбудований мінімум
  if(!wordsLoaded||WORDS.length<20){
    WORDS=["РОСА","ОСЕЛ","СЕЛО","ГОРА","ЛІРА","ЗИМА","СНІГ","МОДА","МОРЕ","ОРДА",
      "ВОДА","РЕВО","ПТАХ","НЕБО","ТАНЕ","ПАНО","КРАН","РАНО","ВИНО","НОРА",
      "РИСА","САЛО","НИВА","РАМА","ДІРА","МІРА","МАЗІ","ГІМН","СИЛА","РИБА",
      "ОСІНЬ","ОБРАЗ","ОРЕЛ","НАМЕТ","ТРАВА","УСПІХ","ХВИЛЯ","КАЗКА","КРАСА",
      "БАЛЕТ","ВІТЕР","ГІСТЬ","ЛОТОС","МАСКА","ПАРУС","РИБАК","ЗБРОЯ","ЗІРКА",
      "СТЕП","ТИША","НОРА","ХАТА","ХЛІБ","ЩУКА","БОРЩ","БРИЗ","ЗОРЯ","ЛУНА"];
    wordsLoaded=true;
  }

  // 2. Завантажуємо монети і підказки
  const uid=getTgUid();
  if(uid){
    try{
      const r=await fetch(`${GAS}?type=circle_init&userId=${uid}&secret=${SECRET}&_t=${Date.now()}`);
      const d=await r.json();
      if(d.coins!==undefined){coins=d.coins;$('coinCount').textContent=coins;}
      if(d.hints!==undefined){hints=d.hints;}
      if(d.hintNextTime!==undefined){hintNextTime=d.hintNextTime;}
      // Якщо підказок немає і час пройшов — даємо 1
      if(hints===0&&hintNextTime>0&&Date.now()>=hintNextTime){hints=1;hintNextTime=Date.now()+HINT_INTERVAL;}
      // Якщо перший раз — даємо 3 підказки
      if(hints===0&&hintNextTime===0){hints=3;hintNextTime=Date.now()+HINT_INTERVAL;}
    }catch(e){
      hints=3; // якщо офлайн — даємо 3
    }
  } else {
    hints=3;
  }
  updateHintUI();
  startHintTimer();

  // 3. Розблоковуємо кнопку ГРАТИ
  const btn=$('startBtn');
  if(btn){btn.disabled=false;btn.style.opacity='1';btn.style.filter='none';btn.textContent='▶ ГРАТИ';}
}
init();
</script>
